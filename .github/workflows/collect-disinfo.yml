# Phase 11 audit (2026-03): This workflow is the "disinfo" data collector.
# - Writes to: disinfo_claims (Supabase). Data source for platform; not duplicated by daily_pipeline Stage 1.
# - Same cron (06:00 UTC) as daily_pipeline; runs independently. Keep running.
# - Future: if article_sources has rows for fact-check feeds, add health columns update here.
name: Collect Disinfo Claims

on:
  schedule:
    - cron: '0 6 * * *'      # Once daily at 06:00 UTC
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/workflows/scripts/requirements.txt

      - name: Run disinfo collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python .github/workflows/scripts/collect_disinfo.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::${{ github.workflow }} FAILED — check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
