name: Collect Disinfo Claims

on:
  schedule:
    - cron: '0 6 * * *'      # Once daily at 06:00 UTC
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/workflows/scripts/requirements.txt

      - name: Run disinfo collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python .github/workflows/scripts/collect_disinfo.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const workflowName = '${{ github.workflow }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠ Pipeline failure: ${workflowName}`,
              body: `The **${workflowName}** workflow failed.\n\n**Run:** ${runUrl}\n**Triggered:** ${new Date().toISOString()}\n\nData on the platform may be stale. Check the logs and re-run if needed.`,
              labels: ['pipeline-failure'],
            });
            core.notice(`Failure issue created: ${issue.data.html_url}`);
