name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build (OpenNext for Cloudflare)
        run: npx opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://qmaszkkyukgiludcakjg.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_jgm9epohpvCavP6zr4pcig_t3E5mvup

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
