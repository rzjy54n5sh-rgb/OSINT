name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check required secrets
        run: |
          missing=""
          [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && missing="$missing NEXT_PUBLIC_SUPABASE_URL"
          [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && missing="$missing NEXT_PUBLIC_SUPABASE_ANON_KEY"
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Add them in repo Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          [ -z "$SUPABASE_SERVICE_KEY" ] && echo "::warning::SUPABASE_SERVICE_KEY not set — /api/generate-briefing will fail until added (and in Cloudflare Pages env)."
          echo "Required secrets present."
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Install dependencies
        run: npm install
      - name: Check Supabase secrets (required for live data)
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing GitHub secrets. Add NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY in repo Settings → Secrets and variables → Actions (see PROJECT.md §11). Then re-run this workflow."
            exit 1
          fi
          echo "Supabase env vars present; writing .env.production for Next.js build."
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # Next.js inlines NEXT_PUBLIC_* from env at build time. Write .env.production so the
      # OpenNext/Next build (possibly in a subprocess) definitely sees them.
      - name: Create .env.production for build
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env.production
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.production
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # Write literal URL/key into a module so the client bundle ALWAYS gets them (bypasses Next env inlining which was flaky under OpenNext/CF)
      - name: Write Supabase env into client module
        run: |
          node -e "
          const fs = require('fs');
          const url = process.env.NEXT_PUBLIC_SUPABASE_URL || '';
          const key = process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY || '';
          if (!url || !key) {
            console.error('Missing NEXT_PUBLIC_SUPABASE_URL or NEXT_PUBLIC_SUPABASE_ANON_KEY');
            process.exit(1);
          }
          const out = 'lib/supabase/env.client.generated.ts';
          fs.writeFileSync(out,
            '/** Generated at build time from GitHub secrets **/\n' +
            'export const NEXT_PUBLIC_SUPABASE_URL = ' + JSON.stringify(url) + ';\n' +
            'export const NEXT_PUBLIC_SUPABASE_ANON_KEY = ' + JSON.stringify(key) + ';\n');
          const written = fs.readFileSync(out, 'utf8');
          if (!written.includes(url.slice(0, 30))) {
            console.error('Generated file did not contain URL');
            process.exit(1);
          }
          console.log('Written', out, '(URL length', url.length, ')');
          "
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Fail if generated env missing (do not cache build between jobs)
        run: |
          grep -q 'supabase\.co' lib/supabase/env.client.generated.ts || { echo "::error::env.client.generated.ts has no URL — build would serve no data"; exit 1; }
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Clean build
        run: rm -rf .next .open-next
      - name: Build
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          npm run build:cf
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - name: Verify Supabase URL in client bundle
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          PROJECT_ID=$(echo "$NEXT_PUBLIC_SUPABASE_URL" | sed -n 's|https://\([^.]*\)\.supabase\.co.*|\1|p')
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Could not parse project ID from NEXT_PUBLIC_SUPABASE_URL"
            exit 1
          fi
          for dir in .next/static .open-next .open-next/assets; do
            if [ -d "$dir" ] && grep -rqF "$PROJECT_ID" "$dir" 2>/dev/null; then
              echo "Supabase project ID found in $dir — client bundle has URL."
              exit 0
            fi
          done
          echo "::error::Project ID $PROJECT_ID not in client bundle. Ensure 'Write Supabase env into client module' ran and built."
          exit 1
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
