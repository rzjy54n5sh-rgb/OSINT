# Phase 11 audit (2026-03): This workflow is the "feeds" data collector.
# - Writes to: articles (Supabase). Does NOT write to nai_scores, country_reports, disinformation_tracker.
# - Does NOT duplicate daily_pipeline.yml Stage 1 (Stage 1 = Perplexity API fetch; this = RSS/Nitter/Telegram).
# - Keep running. Future: optional article_sources health updates (last_fetch_at, health_status) if registry aligns.
name: Collect Feeds (News + Elite Accounts)

on:
  schedule:
    - cron: '0 * * * *'    # Every 60 min (optimized from 30 min)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/workflows/scripts/requirements.txt

      - name: Run unified feed collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python .github/workflows/scripts/collect_feeds.py

      - name: Warm Cloudflare KV cache
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python .github/workflows/scripts/warm_kv_cache.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::${{ github.workflow }} FAILED — check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
