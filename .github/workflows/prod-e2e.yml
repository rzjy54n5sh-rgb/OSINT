name: Production E2E (Live)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Production base URL'
        required: false
        type: string
        default: 'https://mena-intel-desk.mores-cohorts9x.workers.dev'
      suite:
        description: 'Test suite'
        required: false
        type: choice
        default: smoke
        options: [smoke, deep]

env:
  PW_BASE_URL: ${{ github.event.inputs.base_url }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  # Your repo uses SUPABASE_SERVICE_KEY as the service_role key name.
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        if: github.event.inputs.suite == 'smoke'
        run: npx playwright test tests/e2e/prod-smoke.spec.ts tests/api/edge-functions-smoke.spec.ts

      - name: Run deep suite
        if: github.event.inputs.suite == 'deep'
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

