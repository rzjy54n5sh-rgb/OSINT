name: Daily Claude Analysis

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 06:00 UTC (8am Cairo)
  workflow_dispatch:        # Manual trigger any time

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run daily Claude analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/workflows/scripts/daily_analysis.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const workflowName = '${{ github.workflow }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠ Pipeline failure: ${workflowName}`,
              body: `The **${workflowName}** workflow failed.\n\n**Run:** ${runUrl}\n**Triggered:** ${new Date().toISOString()}\n\nData on the platform may be stale. Check the logs and re-run if needed.`,
              labels: ['pipeline-failure'],
            });
            core.notice(`Failure issue created: ${issue.data.html_url}`);
