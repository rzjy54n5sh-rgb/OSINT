name = "mena-intel-desk"
main = ".open-next/worker.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = true

[vars]
NEXT_PUBLIC_SUPABASE_URL = "https://qmaszkkyukgiludcakjg.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_jgm9epohpvCavP6zr4pcig_t3E5mvup"
# Set SUPABASE_SERVICE_KEY in Cloudflare dashboard (Pages → Settings → Environment variables) — same as GitHub secret for pipelines
SUPABASE_SERVICE_KEY = ""

# KV namespace for caching Supabase responses at the edge
# After running: wrangler kv namespace create "OSINT_CACHE"
# Replace the id below with the one Wrangler outputs
[[kv_namespaces]]
binding = "OSINT_CACHE"
id = "5ff576b8a0c44c7fa45618584829df04"
